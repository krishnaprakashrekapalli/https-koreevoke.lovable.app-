<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="KORE — performance essentials. Move with purpose." />
    <meta name="theme-color" content="#000000" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>KORE — Move with purpose</title>
    <style>
      /* Initial paint: black background so the preloader shows instantly */
      html, body { background: #000; }

      #kore-preloader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
        transition: opacity 600ms ease;
        pointer-events: none;
      }
      #kore-preloader .kore-mark {
        width: clamp(160px, 28vw, 320px);
        height: auto;
        opacity: 0;
        transform: scale(0.92);
        animation: kore-mark-in 900ms cubic-bezier(.2,.7,.2,1) 80ms forwards,
                   kore-mark-pulse 1800ms ease-in-out 1000ms infinite;
        filter: drop-shadow(0 0 24px rgba(255,255,255,0.08));
      }
      @keyframes kore-mark-in {
        0%   { opacity: 0; transform: scale(0.88); }
        60%  { opacity: 1; transform: scale(1.02); }
        100% { opacity: 1; transform: scale(1.00); }
      }
      @keyframes kore-mark-pulse {
        0%, 100% { transform: scale(1.00); }
        50%      { transform: scale(1.04); }
      }
      #kore-preloader.is-hidden {
        opacity: 0;
      }
      @media (prefers-reduced-motion: reduce) {
        #kore-preloader .kore-mark {
          animation: none;
          opacity: 1;
          transform: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="kore-preloader" aria-hidden="true">
      <img src="%BASE_URL%kore-logo.png" alt="" class="kore-mark" />
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
